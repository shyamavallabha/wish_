<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Monisha 🤍</title>
    <style>
        /* --- Vintage Scrapbook Textures & Colors --- */
        :root {
            --paper-cream: #f6f3eb;
            --ink-charcoal: #2c2c2c;
            --washi-pink: rgba(240, 178, 188, 0.6);
            --washi-blue: rgba(173, 203, 227, 0.6);
            --font-cursive: 'Georgia', serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--paper-cream);
            color: var(--ink-charcoal);
            overflow-x: hidden;
            font-family: "Courier New", Courier, monospace;
        }

        /* Textured Paper Layer overlay */
        .paper-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.35;
            pointer-events: none;
            z-index: 99;
            background-image: 
                linear-gradient(rgba(0,0,0,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.02) 1px, transparent 1px);
            background-size: 4px 4px;
        }

        /* --- Screen Navigation Mechanics --- */
        .screen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 24px;
            z-index: 10;
            transition: opacity 0.6s ease-in-out, transform 0.6s ease-in-out;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateY(-20px);
        }

        /* --- Screen 1: Interactive Envelope & Gift Box Layout --- */
        .intro-container {
            max-width: 340px;
            width: 100%;
            text-align: center;
        }

        .doodle-box-wrapper {
            position: relative;
            width: 110px;
            height: 110px;
            margin: 0 auto 20px auto;
        }

        .doodle-box-svg {
            width: 100%;
            height: 100%;
            fill: none;
            stroke: var(--ink-charcoal);
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .gift-container:hover .doodle-box-svg {
            animation: gentleShake 0.5s infinite alternate;
        }

        /* --- Puzzle Game Layout Elements --- */
        .puzzle-box {
            margin-top: 25px;
            padding: 20px;
            border: 1.5px dashed var(--ink-charcoal);
            background: rgba(255, 255, 255, 0.4);
            border-radius: 12px;
            display: none; /* Triggered by JS */
            animation: fadeIn 0.4s ease;
        }

        .sentence-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .input-blank {
            width: 100px;
            border: none;
            border-bottom: 2px solid var(--ink-charcoal);
            background: transparent;
            font-family: inherit;
            font-size: 1.1rem;
            text-align: center;
            color: var(--ink-charcoal);
            outline: none;
            padding-bottom: 2px;
        }

        .btn-minimal {
            background: none;
            border: 1.5px solid var(--ink-charcoal);
            color: var(--ink-charcoal);
            padding: 10px 24px;
            font-size: 0.88rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 2px 2px 0px var(--ink-charcoal);
            margin: 5px;
        }

        .btn-minimal:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px var(--ink-charcoal);
        }

        .btn-hint {
            border: 1px dashed #b58d80;
            color: #8a6f62;
            font-size: 0.75rem;
            padding: 6px 12px;
            box-shadow: none;
            background: transparent;
            cursor: pointer;
            margin-top: 5px;
            font-style: italic;
        }

        /* --- Screen 2: Fixed Scrapbook Canvas Architecture --- */
        #reveal-screen {
            justify-content: flex-start;
            overflow-y: auto;
            padding: 40px 20px;
        }

        .collage-container {
            max-width: 380px;
            width: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .typewriter-header {
            text-align: left;
            width: 100%;
            padding: 0 10px;
            margin-bottom: 30px;
            position: relative;
        }

        .doodle-camera {
            position: absolute;
            top: -22px;
            left: 10px;
            font-size: 1.3rem;
        }

        .typewriter-header h1 {
            font-size: 1.35rem;
            font-weight: normal;
            margin-bottom: 10px;
        }

        .typewriter-header p {
            font-size: 0.88rem;
            line-height: 1.6;
            white-space: pre-line;
        }

        /* --- Fixed Beautiful Polaroid Frameworks --- */
        .polaroid-frame {
            background: #ffffff;
            padding: 12px 12px 32px 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0,0,0,0.03);
            width: 85%;
            margin-bottom: 35px;
            position: relative;
            /* Replaced moving dragging with smooth hovering physics */
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1), box-shadow 0.4s ease;
        }

        /* Gentle responsive floating hover adjustments */
        .polaroid-frame:hover {
            transform: scale(1.04) rotate(0deg) !important;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.1);
            z-index: 10;
        }

        .polaroid-frame img {
            width: 100%;
            height: auto;
            aspect-ratio: 4 / 3;
            object-fit: cover;
            filter: grayscale(100%) contrast(110%);
            display: block;
        }

        /* Locked Layout alignments exactly mirroring download (1).jpg style */
        .frame-1 { transform: rotate(4deg); align-self: flex-end; }
        .frame-2 { transform: rotate(-3deg); align-self: flex-start; margin-top: -10px; }

        .circle-portrait-wrapper {
            align-self: flex-end;
            margin-right: 15px;
            margin-top: -15px;
            margin-bottom: 20px;
            position: relative;
            width: 140px;
            transition: transform 0.4s ease;
        }
        .circle-portrait-wrapper:hover {
            transform: scale(1.06);
        }
        .circle-portrait-wrapper img {
            width: 125px;
            height: 125px;
            object-fit: cover;
            border-radius: 50%;
            filter: grayscale(100%);
            border: 4px solid #fff;
            box-shadow: 0 6px 15px rgba(0,0,0,0.04);
        }

        /* Decorative Static Stickers */
        .doodle-sticker {
            position: absolute;
            font-size: 1.1rem;
            pointer-events: none;
            z-index: 5;
        }
        .heart-brown { color: #8a6f62; top: -15px; left: 25%; font-size: 1.2rem; }
        .hands-heart { bottom: -15px; right: 20px; }
        .star-sticker { left: -12px; bottom: -8px; transform: rotate(-15deg); }

        .washi-tape {
            position: absolute;
            width: 65px;
            height: 20px;
            top: -10px;
            left: 50%;
            transform: translateX(-50%) rotate(-2deg);
            background: var(--washi-pink);
            border-left: 1px dashed rgba(0,0,0,0.05);
            border-right: 1px dashed rgba(0,0,0,0.05);
        }

        .polaroid-note {
            font-family: var(--font-cursive);
            font-style: italic;
            font-size: 0.85rem;
            text-align: center;
            margin-top: 12px;
            color: #444;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes gentleShake {
            0% { transform: rotate(-2deg); }
            100% { transform: rotate(2deg); }
        }
    </style>
</head>
<body>

    <div class="paper-overlay"></div>

    <!-- BACKGROUND MUSIC TRACK -->
    <audio id="scrapbook-music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop></audio>

    <!-- PHASE 1: REVISED ENTRY LAYER WITH REVELATION PUZZLE -->
    <div id="screen-intro" class="screen">
        <div class="intro-container" id="gift-container-block">
            <div class="doodle-box-wrapper">
                <svg class="doodle-box-svg" viewBox="0 0 64 64">
                    <path d="M14 26 L14 54 Q14 56 16 56 L48 56 Q50 56 50 54 L50 26 Z"/>
                    <path d="M10 20 L54 20 L54 26 L10 26 Z"/>
                    <path d="M32 20 L32 56"/>
                    <path d="M32 20 C24 10, 20 18, 32 20 C44 18, 40 10, 32 20 Z"/>
                </svg>
            </div>
            <p class="action-text" style="margin-bottom:15px;">A digital memory scrapbook is waiting inside.</p>
            <button class="btn-minimal" id="initial-open-btn" onclick="showSentencePuzzle()">Open Box</button>
        </div>

        <!-- The "midi mental" Puzzle Container -->
        <div class="intro-container">
            <div class="puzzle-box" id="puzzle-box">
                <p class="action-text" style="font-size:0.85rem; color:#555; margin-bottom:15px;">Complete the phrase to unlock:</p>
                <div class="sentence-row">
                    <span>midi</span>
                    <input type="text" id="blank-input" class="input-blank" placeholder="......" autocomplete="off" autofocus>
                </div>
                <button class="btn-minimal" onclick="validatePuzzleAnswer()">Verify</button>
                <br>
                <button class="btn-hint" onclick="triggerAlertHint()">neku undhi gaa adhii!</button>
            </div>
        </div>
    </div>

    <!-- PHASE 2: FIXED POLAROID SCRAPBOOK CANVAS -->
    <div id="reveal-screen" class="screen hidden">
        <div class="collage-container">
            
            <!-- Typewriter Header exactly cloned visually from your picture asset -->
            <div class="typewriter-header">
                <span class="doodle-camera">📸</span>
                <h1 id="header-title">Happiest birthday Monisha</h1>
                <p id="header-paragraph">may god always protect your smile
and always help you in every
journey of your life.</p>
            </div>

            <!-- Polaroid Photo Frame 1 (Top Side Right) -->
            <div class="polaroid-frame frame-1">
                <div class="washi-tape"></div>
                <span class="doodle-sticker heart-brown"> 🤎</span>
                <img id="slot-1" src="https://picsum.photos/id/64/500/380" alt="Scrapbook Memory 1">
                <div class="polaroid-note">Pure Radiance ✨</div>
                <span class="doodle-sticker hands-heart">🫶🏼</span>
            </div>

            <!-- Polaroid Photo Frame 2 (Bottom Side Left) -->
            <div class="polaroid-frame frame-2">
                <div class="washi-tape" style="background:var(--washi-blue);"></div>
                <img id="slot-2" src="https://picsum.photos/id/445/500/380" alt="Scrapbook Memory 2">
                <div class="polaroid-note">Nostalgic Days 🪐</div>
                <span class="doodle-sticker star-sticker">⭐</span>
            </div>

            <!-- Round Cake Cutout Frame Style -->
            <div class="circle-portrait-wrapper">
                <img id="slot-3" src="https://picsum.photos/id/103/300/300" alt="Cake Celebration">
            </div>

        </div>
    </div>

    <!-- --- DATA CUSTOMIZATION ENGINE --- -->
    <script>
        /*****************************************************************
         * CONFIGURATION MATRIX: UPDATE IMAGES & CAPTIONS HERE SAFELY!
         *****************************************************************/
        const SCRAPBOOK_DATA = {
            title: "Happiest birthday Monisha",
            text: `may god always protect your smile
                   and always help you in every
                   journey of your life.`,
            
            // Paste your image URLs inside these quotation marks directly:
            img1: "https://picsum.photos/id/64/500/380",  // Top Polaroid image path
            img2: "https://picsum.photos/id/445/500/380", // Bottom Polaroid image path
            img3: "https://picsum.photos/id/103/300/300", // Circular cutout icon profile path

            audioUrl: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"
        };

        // UI hydration routing
        document.getElementById('header-title').innerText = SCRAPBOOK_DATA.title;
        document.getElementById('header-paragraph').innerText = SCRAPBOOK_DATA.text;
        document.getElementById('slot-1').src = SCRAPBOOK_DATA.img1;
        document.getElementById('slot-2').src = SCRAPBOOK_DATA.img2;
        document.getElementById('slot-3').src = SCRAPBOOK_DATA.img3;
        document.getElementById('scrapbook-music').src = SCRAPBOOK_DATA.audioUrl;

        function showSentencePuzzle() {
            // Hide initial box wrapper button
            document.getElementById('initial-open-btn').style.display = 'none';
            // Smooth reveal puzzle logic layer
            document.getElementById('puzzle-box').style.display = 'block';
        }

        function triggerAlertHint() {
            alert("Hint: Type 'mental' in the blank box to verify identity! 😉");
        }

        function validatePuzzleAnswer() {
            const inputVal = document.getElementById('blank-input').value.trim().toLowerCase();
            
            // Accepts variation definitions safely
            if (inputVal === "mental" || inputVal === "mentel") {
                executeCanvasReveal();
            } else {
                alert("Wrong word! Try again or tap the hint button down below! Hahaha 😂");
            }
        }

        function executeCanvasReveal() {
            // Unblocks browser auto play safety layers natively 
            const music = document.getElementById('scrapbook-music');
            music.play().catch(() => {});

            document.getElementById('screen-intro').classList.add('hidden');
            document.getElementById('reveal-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
