<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Monisha 🤍</title>
    <style>
        /* --- Vintage Scrapbook Textures & Colors --- */
        :root {
            --paper-cream: #f6f3eb;
            --ink-charcoal: #2c2c2c;
            --washi-pink: rgba(240, 178, 188, 0.6);
            --washi-blue: rgba(173, 203, 227, 0.6);
            --font-cursive: 'Georgia', serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--paper-cream);
            color: var(--ink-charcoal);
            overflow: hidden;
            font-family: "Courier New", Courier, monospace;
        }

        /* Real Textured Paper Layer overlay */
        .paper-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.35;
            pointer-events: none;
            z-index: 99;
            background-image: 
                linear-gradient(rgba(0,0,0,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.02) 1px, transparent 1px);
            background-size: 4px 4px;
        }

        /* --- Screen Navigation Mechanics --- */
        .screen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            z-index: 10;
            transition: all 0.8s cubic-bezier(0.77, 0, 0.175, 1);
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(1.1) rotate(2deg);
        }

        /* --- Screen 1: Peak Creative Envelope Unboxing --- */
        .envelope-wrapper {
            position: relative;
            width: 280px;
            height: 200px;
            background: #eae4d3;
            border: 2px solid #dfd7be;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 4px;
            transition: transform 0.3s ease;
        }
        .envelope-wrapper:hover {
            transform: scale(1.03) rotate(-1deg);
        }

        /* Envelope Seal Sticker */
        .seal-sticker {
            width: 60px;
            height: 60px;
            background: #c39b8c;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            color: #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 2;
            animation: pulseSticker 2s infinite ease-in-out;
        }

        @keyframes pulseSticker {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        .envelope-label {
            position: absolute;
            bottom: 20px;
            font-size: 0.85rem;
            letter-spacing: 1px;
            color: #7b7461;
            text-transform: uppercase;
        }

        /* --- Screen 2: Dynamic Live Scrapbook Canvas --- */
        #reveal-screen {
            overflow: hidden;
            background: #fdfbf7;
            display: block; /* Allows free positioning */
        }

        /* Stationary Header */
        .canvas-header {
            position: absolute;
            top: 30px;
            left: 25px;
            right: 25px;
            z-index: 50;
            pointer-events: none;
        }

        .canvas-header h1 {
            font-size: 1.5rem;
            font-weight: normal;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .canvas-header p {
            font-size: 0.85rem;
            line-height: 1.5;
            color: #555;
            max-width: 280px;
        }

        /* Interactive Draggable Polaroid Items */
        .draggable-polaroid {
            position: absolute;
            background: #ffffff;
            padding: 12px 12px 35px 12px;
            box-shadow: 2px 8px 25px rgba(0,0,0,0.06);
            border: 1px solid rgba(0,0,0,0.03);
            width: 170px;
            cursor: move;
            user-select: none;
            touch-action: none;
            z-index: 5;
        }

        .draggable-polaroid img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            filter: grayscale(100%) contrast(115%); /* Matches picture sample verbatim */
            pointer-events: none;
        }

        .polaroid-note {
            font-family: var(--font-cursive);
            font-style: italic;
            font-size: 0.9rem;
            text-align: center;
            margin-top: 12px;
            color: #444;
        }

        /* Realistic Decorative Washi Tape Accents */
        .washi-tape {
            position: absolute;
            width: 70px;
            height: 22px;
            top: -12px;
            left: 50%;
            transform: translateX(-50%) rotate(-3deg);
            background: var(--washi-pink);
            backdrop-filter: blur(1px);
            border-left: 2px dashed rgba(0,0,0,0.05);
            border-right: 2px dashed rgba(0,0,0,0.05);
        }

        /* Scattered Scrapbook Doodles & Stickers */
        .scrap-sticker {
            position: absolute;
            font-size: 1.3rem;
            pointer-events: none;
            animation: gentleFloat 4s infinite ease-in-out;
            z-index: 2;
        }

        /* Customizing individual polaroid initial states */
        #photo1 { top: 220px; left: 25px; transform: rotate(-5deg); }
        #photo2 { top: 240px; right: 25px; transform: rotate(6deg); }
        #photo3 { top: 450px; left: 45px; transform: rotate(-2deg); }
        #photo4 { top: 460px; right: 35px; transform: rotate(4deg); }

        /* Specific positions for scattered elements */
        #sticker-cam { top: 25px; right: 30px; font-size: 1.5rem; }
        #sticker-heart1 { top: 195px; left: 45%; color: #9c6f5d; }
        #sticker-heart2 { bottom: 180px; right: 50px; color: #b58d80; }
        #sticker-star1 { bottom: 40px; left: 30px; }
        #sticker-sparkle { top: 410px; right: 40%; }

        @keyframes gentleFloat {
            0%, 100% { transform: translateY(0) scale(1) rotate(0deg); }
            50% { transform: translateY(-6px) scale(1.05) rotate(4deg); }
        }

        /* --- Audio Music Indicator Widget --- */
        .music-widget {
            position: absolute;
            bottom: 25px;
            right: 25px;
            background: rgba(255,255,255,0.8);
            border: 1px solid #ddd;
            padding: 8px 14px;
            border-radius: 30px;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.04);
        }
        .music-bars {
            display: flex;
            gap: 2px;
            align-items: flex-end;
            height: 10px;
        }
        .bar {
            width: 2px;
            height: 100%;
            background: var(--ink-charcoal);
            animation: soundWave 0.6s infinite alternate;
        }
        .bar:nth-child(2) { animation-delay: 0.2s; }
        .bar:nth-child(3) { animation-delay: 0.4s; }

        @keyframes soundWave {
            0% { height: 2px; }
            100% { height: 10px; }
        }
    </style>
</head>
<body>

    <div class="paper-overlay"></div>

    <!-- BACKGROUND AUDIO SYSTEM -->
    <audio id="scrapbook-music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop></audio>

    <!-- PHASE 1: THE LETTER ENVELOPE UNBOXING -->
    <div id="screen-envelope" class="screen">
        <div class="envelope-wrapper" onclick="openScrapbook()">
            <div class="seal-sticker">🤍</div>
            <div class="envelope-label">To: Monisha</div>
        </div>
        <p style="margin-top: 25px; font-size: 0.85rem; color:#666; letter-spacing: 0.5px;">Tap envelope seal to break opening</p>
    </div>

    <!-- PHASE 2: PEAK CREATIVE INTERACTIVE SCRAPBOOK CANVAS -->
    <div id="reveal-screen" class="screen hidden">
        
        <!-- Standard Scrapbook Lettering Header Block -->
        <div class="canvas-header">
            <h1 id="header-title">Happiest birthday Monisha ✨</h1>
            <p id="header-paragraph">may god always protect your smile and always help you in every journey of your life.</p>
        </div>

        <!-- Scrapbook Doodles / Stickers Floating around natively -->
        <div class="scrap-sticker" id="sticker-cam">📸</div>
        <div class="scrap-sticker" id="sticker-heart1">🤎</div>
        <div class="scrap-sticker" id="sticker-heart2">🫶🏼</div>
        <div class="scrap-sticker" id="sticker-star1">⭐</div>
        <div class="scrap-sticker" id="sticker-sparkle">✨</div>

        <!-- Draggable Polaroid 1 -->
        <div class="draggable-polaroid" id="photo1">
            <div class="washi-tape" style="background: var(--washi-pink);"></div>
            <img id="slot-1" src="https://picsum.photos/id/64/400/400" alt="Scrapbook Memory">
            <div class="polaroid-note">Your Smile ✨</div>
        </div>

        <!-- Draggable Polaroid 2 -->
        <div class="draggable-polaroid" id="photo2">
            <div class="washi-tape" style="background: var(--washi-blue); transform: translateX(-50%) rotate(4deg);"></div>
            <img id="slot-2" src="https://picsum.photos/id/103/400/400" alt="Scrapbook Memory">
            <div class="polaroid-note">Pure Joy 🌸</div>
        </div>

        <!-- Draggable Polaroid 3 -->
        <div class="draggable-polaroid" id="photo3">
            <div class="washi-tape" style="background: var(--washi-pink); width: 50px;"></div>
            <img id="slot-3" src="https://picsum.photos/id/445/400/400" alt="Scrapbook Memory">
            <div class="polaroid-note">Nostalgia 🪐</div>
        </div>

        <!-- Draggable Polaroid 4 -->
        <div class="draggable-polaroid" id="photo4">
            <div class="washi-tape" style="background: var(--washi-blue);"></div>
            <img id="slot-4" src="https://picsum.photos/id/1062/400/400" alt="Scrapbook Memory">
            <div class="polaroid-note">Blessed Year 🎉</div>
        </div>

        <!-- Playing Audio State Widget Display -->
        <div class="music-widget">
            <div class="music-bars"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
            <span>lofi_vibe.mp3</span>
        </div>

    </div>

    <!-- --- PEAK INTERACTION ENGINE INTERFACE --- -->
    <script>
        /*****************************************************************
         * CONFIGURATION MATRIX: UPDATE CONTENT/IMAGES DIRECTLY HERE!
         *****************************************************************/
        const SCRAPBOOK_DATA = {
            title: "Happiest birthday Monisha ✨",
            text: "may god always protect your smile and always help you in every journey of your life.",
            
            // Swap images safely inside quotes here:
            img1: "https://picsum.photos/id/64/400/400",
            img2: "https://picsum.photos/id/103/400/400",
            img3: "https://picsum.photos/id/445/400/400",
            img4: "https://picsum.photos/id/1062/400/400",

            // Track captions
            cap1: "Your Smile ✨",
            cap2: "Pure Joy 🌸",
            cap3: "Nostalgia 🪐",
            cap4: "Blessed Year 🎉",

            audioUrl: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"
        };

        // Hydrate UI elements cleanly on load execution
        document.getElementById('header-title').innerText = SCRAPBOOK_DATA.title;
        document.getElementById('header-paragraph').innerText = SCRAPBOOK_DATA.text;
        document.getElementById('slot-1').src = SCRAPBOOK_DATA.img1;
        document.getElementById('slot-2').src = SCRAPBOOK_DATA.img2;
        document.getElementById('slot-3').src = SCRAPBOOK_DATA.img3;
        document.getElementById('slot-4').src = SCRAPBOOK_DATA.img4;
        document.getElementById('scrapbook-music').src = SCRAPBOOK_DATA.audioUrl;

        function openScrapbook() {
            const music = document.getElementById('scrapbook-music');
            music.play().catch(() => {});

            document.getElementById('screen-envelope').classList.add('hidden');
            document.getElementById('reveal-screen').classList.remove('hidden');
            
            // Initialize dragging calculations smoothly
            makeElementsDraggable();
        }

        // JavaScript Drag & Touch Drag System for peak interactive experience
        function makeElementsDraggable() {
            const items = document.querySelectorAll('.draggable-polaroid');
            let activeItem = null;
            let currentZIndex = 10;

            items.forEach(item => {
                let offsetX = 0, offsetY = 0;

                const dragStart = (e) => {
                    activeItem = item;
                    currentZIndex++;
                    item.style.zIndex = currentZIndex; // Pulls dragged card to top layer
                    
                    const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
                    const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;

                    offsetX = clientX - item.offsetLeft;
                    offsetY = clientY - item.offsetTop;

                    document.addEventListener('mousemove', dragMove);
                    document.addEventListener('touchmove', dragMove, { passive: false });
                    document.addEventListener('mouseup', dragEnd);
                    document.addEventListener('touchend', dragEnd);
                };

                const dragMove = (e) => {
                    if (!activeItem) return;
                    e.preventDefault(); // Prevents mobile screen from bouncing while moving items
                    
                    const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
                    const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;

                    let x = clientX - offsetX;
                    let y = clientY - offsetY;

                    activeItem.style.left = `${x}px`;
                    activeItem.style.top = `${y}px`;
                };

                const dragEnd = () => {
                    activeItem = null;
                    document.removeEventListener('mousemove', dragMove);
                    document.removeEventListener('touchmove', dragMove);
                };

                item.addEventListener('mousedown', dragStart);
                item.addEventListener('touchstart', dragStart, { passive: true });
            });
        }
    </script>
</body>
</html>
